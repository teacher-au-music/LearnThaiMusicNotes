<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เรียนโน้ตดนตรีไทยกับอาจารย์อู๋</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai+Looped:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #a3c4f3;
            --bg-color: #fdf6ec;
            --measure-border: #a3c4f3;
            --slot-border: #d7e3fc;
            --note-white: #ffffff;
            
            --color-dash: #cccccc;
            --color-do: #ef9a9a;
            --color-re: #a5d6a7;
            --color-mi: #ce93d8;
            --color-fa: #90caf9;
            --color-sol: #8c9eff;
            --color-la: #ffe082;
            --color-ti: #f48fb1;
            --color-do-high: #ef9a9a;
            --color-re-high: #a5d6a7;
            --color-mi-high: #ce93d8;
            --color-fa-high: #90caf9;
            --color-sol-high: #8c9eff;
        }

        body {
            font-family: 'IBM Plex Sans Thai Looped', sans-serif;
            background-color: var(--bg-color);
            color: #333333;
            margin: 0;
            padding: 0;
            text-align: center;
            overflow-x: hidden; 
        }

        /* 💡 1. พื้นหลังหยดสี (Radial Gradient) */
        .bg-blobs {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
            background-color: var(--bg-color);
        }
        .blob {
            position: absolute;
            border-radius: 50%;
            animation: float 15s infinite alternate ease-in-out;
            will-change: transform;
        }
        .blob-1 { top: -20%; left: -10%; width: 600px; height: 600px; background: radial-gradient(circle, rgba(255,205,210,0.8) 0%, rgba(255,205,210,0) 70%); }
        .blob-2 { bottom: -20%; right: -5%; width: 700px; height: 700px; background: radial-gradient(circle, rgba(187,222,251,0.8) 0%, rgba(187,222,251,0) 70%); animation-delay: -5s; }
        .blob-3 { top: 30%; left: 30%; width: 500px; height: 500px; background: radial-gradient(circle, rgba(255,249,196,0.8) 0%, rgba(255,249,196,0) 70%); animation-delay: -10s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 40px) scale(1.1); }
        }

        header {
            /* ปรับความโปร่งแสงให้ใสขึ้น และเพิ่มความเบลอให้ฟุ้งกระจาย */
            background: rgba(255, 255, 255, 0.25); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            
            /* สร้างขอบใสแบบกระจก (Inner Border) */
            border: 1px solid rgba(255, 255, 255, 0.4); 
            
            /* เพิ่มเงาที่ซับซ้อนให้ดู "ลอย" จากหน้าจอ */
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            
            color: #3a86ff;
            padding: 12px 40px;
            font-size: 1.5em;
            font-weight: 700;
            position: sticky;
            top: 20px;
            z-index: 100;
            width: fit-content;
            margin: 20px auto 40px auto;
            border-radius: 50px;
            
            /* เพิ่มความใสตัวอักษรให้ดูเป็นเนื้อเดียวกัน */
            letter-spacing: 0.5px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .staff-lines {
            margin: 50px auto 20px auto;
            display: flex;
            flex-direction: column;
            gap: 40px; 
            width: 98%; 
            max-width: 1300px; 
            align-items: center;
        }

        .staff-line {
            display: flex;
            align-items: center;
            justify-content: center; 
            gap: 8px; 
            width: 100%;
            flex-wrap: nowrap; 
            padding-top: 25px; 
            padding-bottom: 10px;
        }

        .staff-label {
            min-width: 75px; 
            flex-shrink: 0;  
            font-weight: 600;
            color: #3a86ff; 
            text-align: right;
            white-space: nowrap; 
            font-size: 1.1em;
            margin-right: 10px; 
        }

        /* ห้องเพลงสีขาวทึบแสง */
        .measure {
            display: flex;
            background-color: #ffffff; 
            border: 2px solid var(--measure-border);
            border-radius: 8px;
            padding: 6px; 
            gap: 3px; 
            position: relative;
            flex-shrink: 1; 
            box-shadow: 0 4px 12px rgba(163, 196, 243, 0.25); 
        }

        .measure-label {
            position: absolute;
            top: -26px; 
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px; 
            color: #3a86ff;
            font-weight: 600;
            white-space: nowrap;
        }

        .note-slot {
            width: 28px; 
            height: 38px; 
            background-color: #ffffff;
            border: 1px solid var(--slot-border);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px; 
            font-weight: 600;
            cursor: pointer;
            transition: all 0.1s ease-in-out; 
            position: relative;
        }

        .note-slot.drop-zone-active {
            background-color: #e3f2fd;
            border: 2px dashed #1e88e5;
        }

        .note-slot.playing {
            background-color: #fff9c4;
            border-color: #fbc02d;
            transform: scale(1.15) translateY(-2px);
            box-shadow: 0 4px 10px rgba(251, 192, 45, 0.4);
            z-index: 10;
        }

        .delete-line-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #ef9a9a;
            transition: transform 0.2s, color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            flex-shrink: 0; 
        }

        .delete-line-btn:hover {
            transform: scale(1.1);
            color: #e53935;
            background-color: rgba(255, 235, 238, 0.7);
        }

        .add-line-container {
            margin-bottom: 40px;
            text-align: center;
        }

        /* 💡 3. แผงพาเลตและคอนโทรล */
        .note-palette {
            margin: 40px auto;
            max-width: 800px;
            text-align: center;
            background: rgba(255, 255, 255, 0.65); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.05);
            padding: 25px;
            border-radius: 20px;
        }

        .note-instruction {
            margin-bottom: 20px;
            color: #555555;
            font-size: 16px;
            font-weight: 600;
        }

        .note-buttons {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .note {
            display: inline-flex;
            width: 45px;
            height: 45px;
            border: none;
            border-radius: 8px;
            font-size: 20px;
            font-weight: 600;
            color: white;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            cursor: grab;
            transition: transform 0.1s, box-shadow 0.1s; 
            user-select: none; 
            touch-action: none; 
            will-change: transform; 
        }

        .note:active {
            cursor: grabbing;
            transform: scale(0.95);
        }

        .note:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        .note.color-dash { background-color: var(--color-dash); }
        .note.color-do { background-color: var(--color-do); }
        .note.color-re { background-color: var(--color-re); }
        .note.color-mi { background-color: var(--color-mi); }
        .note.color-fa { background-color: var(--color-fa); }
        .note.color-sol { background-color: var(--color-sol); }
        .note.color-la { background-color: var(--color-la); }
        .note.color-ti { background-color: var(--color-ti); }
        .note.color-do-high { background-color: var(--color-do-high); }
        .note.color-re-high { background-color: var(--color-re-high); }
        .note.color-mi-high { background-color: var(--color-mi-high); }
        .note.color-fa-high { background-color: var(--color-fa-high); }
        .note.color-sol-high { background-color: var(--color-sol-high); }

        .controls {
            margin: 40px auto 80px auto;
            max-width: 900px;
            background: rgba(255, 255, 255, 0.65); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.05);
            padding: 20px 30px;
            border-radius: 20px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap; 
            gap: 20px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .control-group-vertical {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 15px; 
        }

        .control-label {
            font-weight: 600;
            color: #3a86ff;
            font-size: 15px;
        }

        button.action-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #3a86ff;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 16px;
            font-family: 'IBM Plex Sans Thai Looped', sans-serif;
            transition: color 0.2s, transform 0.1s;
        }

        button.action-btn:hover {
            color: #1e88e5;
            transform: scale(1.03);
        }

        .glass-btn {
            background: rgba(255, 255, 255, 0.6) !important;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.9) !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            padding: 8px 18px; 
            border-radius: 12px;
        }
        .glass-btn:hover {
            background: #ffffff !important;
        }

        .rhythm-control-select {
            border: 2px solid rgba(58, 134, 255, 0.4);
            border-radius: 8px;
            padding: 5px 15px;
            background-color: rgba(255, 255, 255, 0.9);
            color: #3a86ff;
            font-weight: 600;
            font-size: 16px;
            font-family: 'IBM Plex Sans Thai Looped', sans-serif;
            cursor: pointer;
            outline: none;
            appearance: auto; 
            text-align: center;
        }

        .ching-icon-container {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
        }
        .ching-icon {
            width: 200%;
            height: 200%;
            object-fit: contain;
            transition: opacity 0.2s;
        }
        .muted-slash {
            position: absolute;
            top: 50%;
            left: -10%;
            width: 120%;
            height: 3px;
            background-color: #ef9a9a; 
            transform: rotate(-45deg);
            display: none; 
            border-radius: 2px;
            box-shadow: 0 0 3px rgba(0,0,0,0.2);
            z-index: 2;
        }
        .ching-icon-container.muted .muted-slash {
            display: block; 
        }
        .ching-icon-container.muted .ching-icon {
            opacity: 0.5; 
        }

        .tempo-control {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .tempo-value-display {
            font-size: 18px;
            font-weight: 600;
            color: #3a86ff;
        }

        input[type="range"] {
            width: 150px;
            cursor: pointer;
            accent-color: #3a86ff; 
        }

        .icon-svg {
            width: 18px;
            height: 18px;
            margin-right: 2px;
        }

    </style>
</head>
<body>

    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <header>โน้ตเพลงไทย..สไตล์เรา</header>

    <div class="staff-lines" id="staff-container">
    </div>

    <div class="add-line-container">
        <button class="action-btn glass-btn" id="add-line-btn" style="margin: 0 auto;">
            <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg> 
            เพิ่มบรรทัด
        </button>
    </div>

    <div class="note-palette">
        <p class="note-instruction">ลากโน้ตใส่ในห้องเพลงเพื่อแต่งเพลง</p>
        <div class="note-buttons">
            <div class="note color-dash" draggable="true" data-note="-" data-color="color-dash">-</div>
            <div class="note color-do" draggable="true" data-note="ด" data-color="color-do">ด</div>
            <div class="note color-re" draggable="true" data-note="ร" data-color="color-re">ร</div>
            <div class="note color-mi" draggable="true" data-note="ม" data-color="color-mi">ม</div>
            <div class="note color-fa" draggable="true" data-note="ฟ" data-color="color-fa">ฟ</div>
            <div class="note color-sol" draggable="true" data-note="ซ" data-color="color-sol">ซ</div>
            <div class="note color-la" draggable="true" data-note="ล" data-color="color-la">ล</div>
            <div class="note color-ti" draggable="true" data-note="ท" data-color="color-ti">ท</div>
            <div class="note color-do-high" draggable="true" data-note="ดํ" data-color="color-do-high">ดํ</div>
            <div class="note color-re-high" draggable="true" data-note="รํ" data-color="color-re-high">รํ</div>
            <div class="note color-mi-high" draggable="true" data-note="มํ" data-color="color-mi-high">มํ</div>
            <div class="note color-fa-high" draggable="true" data-note="ฟํ" data-color="color-fa-high">ฟํ</div>
            <div class="note color-sol-high" draggable="true" data-note="ซํ" data-color="color-sol-high">ซํ</div>
        </div>
    </div>

    <div class="controls">
        <button class="action-btn" id="play-btn">
            <svg class="icon-svg" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
            <span>เล่น</span>
        </button>
        
        <button class="action-btn" id="ching-toggle-btn">
            <div class="ching-icon-container muted" id="ching-icon-wrapper">
                <img src="ching.png" alt="ฉิ่ง" class="ching-icon" onerror="this.outerHTML='<span style=\'font-size: 24px;\'>🛎️</span>'">
                <div class="muted-slash" id="ching-slash"></div>
            </div>
            <span id="ching-status-text" style="min-width: 45px; text-align: left;">ปิด</span>
        </button>
        
        <div class="control-group">
            <span class="control-label">อัตราจังหวะ</span>
            <select class="rhythm-control-select" id="rhythm-select">
                <option value="3">สามชั้น</option>
                <option value="2" selected>สองชั้น</option>
                <option value="1">ชั้นเดียว</option>
            </select>
        </div>

        <div class="control-group tempo-control">
            <span class="control-label">ความช้า-เร็ว</span>
            <span class="tempo-value-display" id="tempo-value">90</span>
            <input type="range" id="tempo-slider" min="40" max="200" value="90">
        </div>

        <div class="control-group-vertical">
            <button class="action-btn" id="fill-dash-btn">
                <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                ใส่ -
            </button>
            <button class="action-btn" id="clear-notes" style="color: #ef5350;">
                <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                ลบโน้ตทั้งหมด
            </button>
        </div>
    </div>

    <script>
        const staffContainer = document.getElementById('staff-container');
        const addLineBtn = document.getElementById('add-line-btn');
        let isDraggingNote = false; 
        let sourceSlot = null; 

        const playIcon = `<svg class="icon-svg" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>`;
        const pauseIcon = `<svg class="icon-svg" viewBox="0 0 24 24" fill="currentColor" stroke="none"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>`;
        const removeLineIcon = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg>`;

        function makeSlotDroppable(slot) {
            slot.addEventListener('dragover', (e) => {
                e.preventDefault(); 
                slot.classList.add('drop-zone-active');
            });
            
            slot.addEventListener('dragleave', () => {
                slot.classList.remove('drop-zone-active');
            });
            
            slot.addEventListener('drop', (e) => {
                e.preventDefault();
                const noteContent = e.dataTransfer.getData('text/plain');
                const noteColor = e.dataTransfer.getData('data-color');
                
                if (sourceSlot === slot) {
                    slot.classList.remove('drop-zone-active');
                    return;
                }

                if (sourceSlot) {
                    sourceSlot.innerHTML = '';
                }
                
                slot.innerHTML = '';
                const newNoteDiv = document.createElement('div');
                newNoteDiv.className = `note ${noteColor}`;
                newNoteDiv.innerText = noteContent;
                newNoteDiv.style.width = '100%'; 
                newNoteDiv.style.height = '100%'; 
                newNoteDiv.style.boxShadow = 'none'; 
                newNoteDiv.style.borderRadius = '4px'; 
                
                newNoteDiv.setAttribute('data-note', noteContent);
                newNoteDiv.setAttribute('data-color', noteColor);
                newNoteDiv.setAttribute('draggable', 'true');
                
                newNoteDiv.addEventListener('dragstart', (dragEvent) => {
                    isDraggingNote = true; 
                    dragEvent.dataTransfer.setData('text/plain', noteContent);
                    dragEvent.dataTransfer.setData('data-color', noteColor);
                    newNoteDiv.style.opacity = '0.9'; 
                    sourceSlot = slot; 
                    dragEvent.stopPropagation(); 
                });
                
                newNoteDiv.addEventListener('dragend', () => {
                    newNoteDiv.style.opacity = '1';
                    setTimeout(() => isDraggingNote = false, 100); 
                });
                
                slot.appendChild(newNoteDiv);
                slot.classList.remove('drop-zone-active');
                
                sourceSlot = null; 
            });
            
            slot.addEventListener('click', () => {
                if (isDraggingNote) return; 
                if(slot.innerHTML !== '') {
                    slot.innerHTML = '';
                }
            });
        }

        function createLine() {
            const currentLines = document.querySelectorAll('.staff-line').length;
            if (currentLines >= 10) return; 

            const lineDiv = document.createElement('div');
            lineDiv.className = 'staff-line';
            
            const labelSpan = document.createElement('span');
            labelSpan.className = 'staff-label';
            lineDiv.appendChild(labelSpan);

            for (let m = 1; m <= 8; m++) {
                const measureDiv = document.createElement('div');
                measureDiv.className = 'measure';
                
                const measureLabelSpan = document.createElement('span');
                measureLabelSpan.className = 'measure-label';
                measureLabelSpan.innerText = `ห้อง ${m}`;
                measureDiv.appendChild(measureLabelSpan);

                for (let n = 1; n <= 4; n++) {
                    const slotDiv = document.createElement('div');
                    slotDiv.className = 'note-slot';
                    slotDiv.innerText = ""; 
                    makeSlotDroppable(slotDiv); 
                    measureDiv.appendChild(slotDiv);
                }
                lineDiv.appendChild(measureDiv);
            }

            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'delete-line-btn';
            deleteBtn.innerHTML = removeLineIcon;
            deleteBtn.title = 'ลบบรรทัดนี้';
            deleteBtn.addEventListener('click', () => {
                lineDiv.remove();
                updateLineLabels(); 
            });
            lineDiv.appendChild(deleteBtn);

            staffContainer.appendChild(lineDiv);
            updateLineLabels();
        }

        function updateLineLabels() {
            const lines = document.querySelectorAll('.staff-line');
            lines.forEach((line, index) => {
                const label = line.querySelector('.staff-label');
                label.innerText = `บรรทัด ${index + 1}`;
                
                const delBtn = line.querySelector('.delete-line-btn');
                if (delBtn) {
                    if (index === 0) {
                        delBtn.style.visibility = 'hidden'; 
                    } else {
                        delBtn.style.visibility = 'visible';
                    }
                }
            });

            if (lines.length >= 10) {
                addLineBtn.style.display = 'none';
            } else {
                addLineBtn.style.display = 'inline-flex';
            }
        }

        createLine();
        createLine();

        addLineBtn.addEventListener('click', () => {
            createLine();
        });

        const draggableNotes = document.querySelectorAll('.note-buttons .note');
        draggableNotes.forEach(note => {
            note.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('text/plain', note.getAttribute('data-note'));
                e.dataTransfer.setData('data-color', note.getAttribute('data-color'));
                note.style.opacity = '0.9'; 
                sourceSlot = null; 
            });
            note.addEventListener('dragend', () => {
                note.style.opacity = '1';
            });
        });

        const fillDashBtn = document.getElementById('fill-dash-btn');
        fillDashBtn.addEventListener('click', () => {
            const currentSlots = document.querySelectorAll('.note-slot');
            currentSlots.forEach(slot => {
                if (slot.innerHTML === '') {
                    const noteContent = '-';
                    const noteColor = 'color-dash';

                    const newNoteDiv = document.createElement('div');
                    newNoteDiv.className = `note ${noteColor}`;
                    newNoteDiv.innerText = noteContent;
                    newNoteDiv.style.width = '100%'; 
                    newNoteDiv.style.height = '100%'; 
                    newNoteDiv.style.boxShadow = 'none'; 
                    newNoteDiv.style.borderRadius = '4px'; 
                    
                    newNoteDiv.setAttribute('data-note', noteContent);
                    newNoteDiv.setAttribute('data-color', noteColor);
                    newNoteDiv.setAttribute('draggable', 'true');
                    
                    newNoteDiv.addEventListener('dragstart', (dragEvent) => {
                        isDraggingNote = true;
                        dragEvent.dataTransfer.setData('text/plain', noteContent);
                        dragEvent.dataTransfer.setData('data-color', noteColor);
                        newNoteDiv.style.opacity = '0.9';
                        sourceSlot = slot; 
                        dragEvent.stopPropagation(); 
                    });
                    
                    newNoteDiv.addEventListener('dragend', () => {
                        newNoteDiv.style.opacity = '1';
                        setTimeout(() => isDraggingNote = false, 100); 
                    });
                    
                    slot.appendChild(newNoteDiv);
                }
            });
        });

        const clearNotesBtn = document.getElementById('clear-notes');
        clearNotesBtn.addEventListener('click', () => {
            const currentSlots = document.querySelectorAll('.note-slot');
            currentSlots.forEach(slot => {
                slot.innerHTML = ''; 
            });
        });

        const thaiFrequencies = {
            "ด": 460.6, 
            "ร": 508.5, 
            "ม": 561.5, 
            "ฟ": 619.9, 
            "ซ": 684.4, 
            "ล": 755.7, 
            "ท": 834.4, 
            "ดํ": 921.2, 
            "รํ": 1017.1, 
            "มํ": 1123.0, 
            "ฟํ": 1239.9, 
            "ซํ": 1368.9  
        };

        const CHING_START_OFFSET = 0.0; 
        const CHAP_START_OFFSET = 0.0;
        
        let audioCtx;
        let chingBuffer, chapBuffer;
        let isAudioLoaded = false;
        
        let metronomeTimerID;
        let nextNoteTime = 0;
        let currentBeatStep = 0; 
        
        let isPlaying = false; 
        let isChingActive = false; 
        
        let activeChingSource = null;
        let activeFluteSources = []; 

        function playFluteSound(frequency, time, duration) {
            const osc1 = audioCtx.createOscillator(); 
            const osc2 = audioCtx.createOscillator(); 
            
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = frequency * 1.5; 
            
            const gain = audioCtx.createGain();
            
            const lfo = audioCtx.createOscillator();
            const lfoGain = audioCtx.createGain();
            lfo.type = 'sine';
            lfo.frequency.value = 5.0; 
            lfoGain.gain.value = frequency * 0.006; 
            lfo.connect(lfoGain);
            lfoGain.connect(osc1.frequency);
            lfoGain.connect(osc2.frequency); 
            lfo.start(time);
            lfo.stop(time + duration);

            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(frequency, time);
            
            osc2.type = 'triangle';
            osc2.frequency.setValueAtTime(frequency, time);
            
            const osc2Gain = audioCtx.createGain();
            osc2Gain.gain.value = 0.4; 

            const attack = Math.min(0.12, duration * 0.3); 
            const release = Math.min(0.2, duration * 0.3); 
            
            gain.gain.setValueAtTime(0, time);
            gain.gain.linearRampToValueAtTime(0.8, time + attack);
            gain.gain.setValueAtTime(0.8, time + Math.max(attack, duration - release));
            gain.gain.linearRampToValueAtTime(0, time + duration);

            osc1.connect(filter);
            osc2.connect(osc2Gain);
            osc2Gain.connect(filter); 
            
            filter.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc1.start(time);
            osc2.start(time);
            osc1.stop(time + duration);
            osc2.stop(time + duration);

            activeFluteSources.push(osc1, osc2);
            osc1.onended = () => {
                activeFluteSources = activeFluteSources.filter(o => o !== osc1 && o !== osc2);
            };
        }

        async function loadAudioFiles() {
            if (isAudioLoaded) return;
            window.AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            
            try {
                const [chingRes, chapRes] = await Promise.all([
                    fetch('ching.mp3'), 
                    fetch('chap.mp3')
                ]);
                const chingArrayBuffer = await chingRes.arrayBuffer();
                const chapArrayBuffer = await chapRes.arrayBuffer();
                
                chingBuffer = await audioCtx.decodeAudioData(chingArrayBuffer);
                chapBuffer = await audioCtx.decodeAudioData(chapArrayBuffer);
                isAudioLoaded = true;
            } catch (err) {
                console.error("ไม่สามารถโหลดไฟล์เสียงได้", err);
            }
        }

        function nextNote() {
            const bpm = parseInt(document.getElementById('tempo-slider').value);
            const secondsPerBeat = 60.0 / bpm; 
            nextNoteTime += secondsPerBeat;
            currentBeatStep++;
        }

        function scheduleNote(beatNumber, time) {
            const bpm = parseInt(document.getElementById('tempo-slider').value);
            const baseDuration = 60.0 / bpm; 

            const slots = document.querySelectorAll('.note-slot');
            const currentTotalSlots = slots.length;

            if (currentTotalSlots === 0) return; 

            const slotIndex = beatNumber % currentTotalSlots; 
            const noteText = slots[slotIndex].innerText.trim();

            if (noteText && thaiFrequencies[noteText]) {
                let dashCount = 0;
                for (let i = 1; i < currentTotalSlots; i++) {
                    let nextIndex = (slotIndex + i) % currentTotalSlots;
                    let nextText = slots[nextIndex].innerText.trim();
                    if (nextText === "-") {
                        dashCount++;
                    } else {
                        break;
                    }
                }
                
                const totalDuration = baseDuration * (1 + dashCount);
                playFluteSound(thaiFrequencies[noteText], time, totalDuration);
            }

            const delayToHighlight = (time - audioCtx.currentTime) * 1000;
            setTimeout(() => {
                slots.forEach(s => s.classList.remove('playing'));
                slots[slotIndex].classList.add('playing');
            }, delayToHighlight);

            if (isChingActive) {
                const rhythmType = document.getElementById('rhythm-select').value;
                let playChing = false;
                let playChap = false;

                if (rhythmType === "2") { 
                    if (beatNumber % 4 === 1) playChing = true;
                    if (beatNumber % 4 === 3) playChap = true;
                } else if (rhythmType === "1") { 
                    if (beatNumber % 2 === 0) playChing = true;
                    if (beatNumber % 2 === 1) playChap = true;
                } else if (rhythmType === "3") { 
                    if (beatNumber % 8 === 3) playChing = true;
                    if (beatNumber % 8 === 7) playChap = true;
                }

                if (playChing && chingBuffer) {
                    const source = audioCtx.createBufferSource();
                    source.buffer = chingBuffer;
                    source.connect(audioCtx.destination);
                    source.start(time, CHING_START_OFFSET); 
                    activeChingSource = source; 
                }

                if (playChap && chapBuffer) {
                    if (activeChingSource) {
                        try { activeChingSource.stop(time); } catch(e) {}
                        activeChingSource = null;
                    }
                    const source = audioCtx.createBufferSource();
                    source.buffer = chapBuffer;
                    source.connect(audioCtx.destination);
                    source.start(time, CHAP_START_OFFSET);
                }
            }
        }

        function scheduler() {
            while (nextNoteTime < audioCtx.currentTime + 0.1) {
                scheduleNote(currentBeatStep, nextNoteTime);
                nextNote();
            }
            metronomeTimerID = setTimeout(scheduler, 25.0);
        }

        const playBtn = document.getElementById('play-btn');
        const chingToggleBtn = document.getElementById('ching-toggle-btn');
        const chingStatusText = document.getElementById('ching-status-text');
        const chingIconWrapper = document.getElementById('ching-icon-wrapper');
        const tempoSlider = document.getElementById('tempo-slider');
        const tempoValueDisplay = document.getElementById('tempo-value');

        playBtn.addEventListener('click', async () => {
            if (!isAudioLoaded) {
                playBtn.innerHTML = `<span>⏳</span> โหลด...`;
                await loadAudioFiles(); 
            }

            if (audioCtx.state === 'suspended') audioCtx.resume();

            isPlaying = !isPlaying;
            
            if (isPlaying) {
                playBtn.innerHTML = `${pauseIcon} <span>หยุด</span>`;
                playBtn.style.color = "#e53935"; 
                
                nextNoteTime = audioCtx.currentTime + 0.05; 
                currentBeatStep = 0; 
                scheduler(); 
            } else {
                playBtn.innerHTML = `${playIcon} <span>เล่น</span>`;
                playBtn.style.color = "#3a86ff";
                
                clearTimeout(metronomeTimerID); 
                document.querySelectorAll('.note-slot').forEach(s => s.classList.remove('playing')); 
                
                activeFluteSources.forEach(osc => {
                    try { osc.stop(); } catch(e) {}
                });
                activeFluteSources = []; 

                if (activeChingSource) {
                    try { activeChingSource.stop(); } catch(e) {}
                    activeChingSource = null;
                }
            }
        });

        chingToggleBtn.addEventListener('click', async () => {
            if (!isAudioLoaded) await loadAudioFiles(); 

            isChingActive = !isChingActive;
            if (isChingActive) {
                chingStatusText.innerText = 'เปิด';
                chingIconWrapper.classList.remove('muted');
            } else {
                chingStatusText.innerText = 'ปิด';
                chingIconWrapper.classList.add('muted');
            }
        });

        tempoSlider.addEventListener('input', () => {
            tempoValueDisplay.innerText = tempoSlider.value;
        });

    </script>
</body>
</html>
